<!DOCTYPE html>
<html>
    <head>
    <style>
        ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #159849;
}
    ul li 
    {
       float: left;
    }
    ul li a {
  display: block;
  color: white;
  text-align: center;
  padding: 10px 15px;
  text-decoration: none;
  font-size: 20px;
    }
    ul li a:hover {
  background-color: #25ab66;
    }
    </style>
    </head>
    <body>
        <h1>Horizonal bar</h1>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#news">News</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="#about">About</a></li>
        </ul>

    </body>
</html>
