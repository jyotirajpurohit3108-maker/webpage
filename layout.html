<!DOCTYPE html>
<html>
    <head>
     <style>
        .header{
            width: 100%;
            background-color: rgb(35, 105, 166);
            border: 2px solid black;
            height: 70px;
            text-align: center;
            color: aliceblue;
            line-height: 50px;
        }
        .navbar{
            width: 100%;
            background-color: black;
            color:white;
            height: 50px;
            text-align: center;
            line-height: 50px;
            
           /* padding-top: 10px;*/
        }
        
        .container{
            
             width: 100%;
             overflow: auto;
             border: 1px solid black;
             height: 300px;
        }
        .box{
              float: left;
             width: 33.33%; 
              height:300px;
              /*padding: 50px;*/
              box-sizing: border-box;
              text-align: center;
              color: white;

            
             }
.box1 {
    background-color: #f76c6c; /* Red background */
}
.box2 {
    background-color: #4caf50; /* Green background */
}
.box3 {
    background-color: #42a5f5; /* Blue background */
    float: right;
}
.footer{
    background-color:#42a5f5;
    border: 1px solid black;
    color: white;
    text-align: center;
    height: 100px;
    line-height: 100px;

    

}

     </style>
    </head>
    <body>
        <div class="header">Header</div>
        <div class="navbar">
           Navigation Bar
        </div>
        <div class="container">
            <div class="box box1">colum1</div>
            <div class="box box2">colum2</div>
            <div class="box box3">colum3</div>
        </div>
     <div class="footer">Footer</div>   
    </body>
</html>
