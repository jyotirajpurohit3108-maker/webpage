<!DOCTYPE html>
<html>
    <head>
    <style>
        ul
        {
          list-style-type:none; 
          margin: 0px;
          padding:0px;
          background-color: #f1f1f1;
          width: 200px; 
          font-size: medium;
        }
       li a {
            display: block;
            color: black;
            padding: 8px 16px;
            text-decoration: none;
        }
        li a:hover{
            background-color: rgb(30, 157, 68);
            color: white;
        }
        li a.active {
         background-color: #04AA6D;
         color: white;}
    </style>
    </head>
    <body>
        <h1>Vertical Navbar</h1>
        <ul>
            <li><a class="active" href="#home">Home</a></li>
            <li><a>News</a></li>
            <li><a>Contact</a></li>
            <li><a>about</a></li>
        </ul>
    


    </body>
</html>
