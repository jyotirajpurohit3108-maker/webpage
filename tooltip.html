<!DOCTYPE html>
<html>
    <head>
        <title>Document</title>
        <style>
            .tooltip{
              font-size: 20px;
                font-weight: bold;
                color: green;
                border-bottom: 1px dashed currentColor;
                display: inline-block;
                position: relative;
            cursor: pointer;
                }
                .tooltiptext
                {
                   visibility: hidden;
                   opacity: 0;
                   position: absolute;
                   font-size: 15px;
                   color: #fff;
                   background-color: gray;
                   width: max-content;
                   font-weight: 400;
                   padding: 10px 15px;
                   border-radius: 5px;
                    border-radius: 5px;
                   top: 50%;
                    right: -120%;
                    transform: translateY(-50%);
                     transition: 1s;
                }
                .tooltiptext::before{
                    content: "";
                    position: absolute;
                    left: -10px;
                    top: 50%;
                     transform: translateY(-50%);
                     clip-path: polygon(0 50%, 100% 100%, 100% 0);
                     width: 20px;
                     height: 20px;
                      background-color: gray;
                     }
                .tooltip:hover .tooltiptext{
                visibility: visible;
                opacity: 1;
}

        </style>
    </head>
    <body>
       <div class="tooltip" title="Tooltip">Hover over me
       <span class="tooltiptext">Some tooltip text</span>
       </div> 
    </body>
</html>
