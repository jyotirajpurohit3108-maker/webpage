<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        header{
            width: 50%;
            height: 100px;
            text-align: center;
            color: #f1f1f1;
            background-color: rgb(22, 132, 206);
            
            
        
        }
        .container{
            height: 300px;
            width: 50%;
           /* border: 1px solid black;*/
            display: flex;
            margin-top: 10px;
            gap: 10px;
        }
        .main{
             width:80%;
            height: 290px;
            border: 1px solid black;
            background-color: green;
            display: flex;
             flex-wrap: wrap;
            
        }
        .main div {
            width: 80px;
         background-color: #f1f1f1;
         margin-top: 10px;
         margin-left: 40px;
         padding: 20px;
         font-size:20px;
         height: 8px;
         box-shadow: rgba(0, 0, 0, 0.25) 0px 54px 55px, rgba(0, 0, 0, 0.12) 0px -12px 30px, rgba(0, 0, 0, 0.12) 0px 4px 6px, rgba(0, 0, 0, 0.17) 0px 12px 13px, rgba(0, 0, 0, 0.09) 0px -3px 5px;
         background-color: rgb(8, 69, 26);
         color: #f1f1f1;
         border-radius: 5px;
        }
        .sidebar{
          width: 20%;
          height: 290px;
          color: #f1f1f1;
          text-align: center;
          border: 1px solid black;
          background-color:orangered 
        }
        footer{
            width: 50%;
            height: 100px;
            text-align: center;
            color: #f1f1f1;
            background-color: rgb(22, 132, 206);
        }
    </style>
</head>
<body>
    <header>Header</header>
    <div class="container">
        <div class="main">
            <div>Item 1</div>
            <div>Item 2</div>
            <div>Item 3</div>
            <div>Item 4</div>
            <div>Item 5</div>
            <div>Item 6</div>
            <div>Item 7</div>
            <div>Item 8</div>
            <div>Item 9</div>
            <div>Item 10</div>
            <div>Item 11</div>
            <div>Item 12</div>
        </div>
        <div class="sidebar">sidebar</div>
    </div>
    <footer>Footer</footer>
</body>
</html>
