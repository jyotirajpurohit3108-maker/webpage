<!DOCTYPE html>
<html>
    <head>
   <style>
    
    .border1{
       border: 1px solid black; 
       border-radius: 20px 20px 20px 20px;

    }

          border: 1px solid black; 
          border-radius: 20px 20px 20px 20px;
          height: 100px;

          padding: 50px;
    }
    .border3{
         border: 1px solid black;

         border: 1px solid black;

  background: #04AA6D;

    }
