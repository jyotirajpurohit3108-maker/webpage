<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        function calculater(a,b,c=1)
        {
            if(c==1)
        {
            
            let c=a+b;
            document.getElementById("demo").innerHTML=c;
        }
        else if(c==2)
        {
            let c=Math.abs(a-b);
            document.getElementById("demo").innerHTML = c;
        }
        else if(c==3)
        {
            let c=a*b;
            document.getElementById("demo").innerHTML = c;
        }
        else if(c==4)
        {
                let c = a / b;
                document.getElementById("demo").innerHTML = c;
        }
        }
        calculater(4,5 ,1);

    </script>
</body>
</html>
