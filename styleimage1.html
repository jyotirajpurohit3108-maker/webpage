<!DOCTYPE html>
<html lang="en">
    <head>
    <style>
      .container{
         position: relative;
         width: 50%;
      }
      .image{
        display: block;
        width: 200px;
       height: auto;
      }
      .overlay{
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right:0;
        height: auto;
        width: 200px;
        opacity: 0;
        transition: .4s ease;
        background-color:skyblue;
           }
           .container:hover .overlay {
  opacity: 1;
           }
     .text{
        color: white;
        font-size: 15px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%,-50%);

     }
     .container1 {
  position: relative;
  width: 200px;
}
   .image1 {
  opacity: 1;
  display: block;
  width: 200px;
  height: auto;
  transition: .5s ease;
  backface-visibility: hidden;
}
.middle {
  transition: .4s ease;
  opacity: 0;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-40%, -40%);

}
.container1:hover .image1 {
  opacity: 0.3;
}
.container1:hover .middle {
  opacity: 1;
}
.text1 {
  background-color: #4CAF50;
  color: white;
  font-size: 16px;
  padding: 16px 32px;
}
.container2 {
  position: relative;
  width:200px;
}
.image2{
  display: block;
  width: 200px;
  height: auto;
}
  .overlay1 {
  position: absolute;
  bottom: 100%;
  left: 0;
  right: 0;
  background-color: #008CBA;
  overflow: hidden;
  width: 200px;
  height: 0;
  transition: .5s ease;
}
.container2:hover .overlay1 {
  bottom: 0;
  height:100%;
}
.text2{
  white-space: nowrap; 
  color: white;
  font-size: 20px;
  position: absolute;
  overflow: hidden;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

}

    </style>
    </head>
    <body>
        <h3>Fade in text</h3>
        <div class="container">
            <img src="https://www.w3schools.com/w3css/img_avatar3.png" class="image">
            <div class="overlay">
                <div class="text">Hello world</div>
            </div>
        </div>
        <h3>Fade in a Box</h3>
        
        <div class="container1">
            <img src="https://www.w3schools.com/w3css/img_avatar3.png" class="image1">
            <div class="middle">
                <div class="text1">text</div>
            </div>
        </div>
        <h3>Slide in Overlay from the Top</h3>
        
        <div class="container2">
            <img src="https://www.w3schools.com/w3css/img_avatar3.png" class="image2">
            <div class="overlay1">
                <div class="text2">Hello World</div>
            </div>
        </div>
    </body>
    <html>
